body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳教大師臣法天奉詔譯次下諸部真言請召發遣供獻加持並皆通用阿難哆鉢納摩二合引野娑嚩二合引賀引此是蓮花寶藏真言阿難哆商佉引野娑嚩二合引賀引此是硨磲寶藏真言囉惹曩引婆引野馱曩引地鉢哆曳娑嚩二合引賀引此是囉惹哆曩婆夜叉王真言摩尼曩引婆引野引馱曩引地鉢哆曳娑嚩二合引賀引此是囉怛曩二合曩引婆夜叉王真言酥曩引婆引野馱曩引地鉢哆曳引娑嚩二合引賀此是酥曩引婆夜叉王真言暗婆曩引婆引野馱曩引地鉢哆曳引娑嚩二合引賀此是暗婆曩引婆夜叉王真言儞囉曩引婆引野馱曩引地鉢哆曳引娑嚩二合引賀此是羅曩婆夜叉王真言吠室囉二合摩拏也二合野馱曩引地鉢哆曳引娑嚩二合引賀此是毘沙門夜叉王真言摩賀引曩引婆引野馱曩引地鉢哆曳引娑嚩二合賀此是摩賀引曩引婆夜叉王真言賀囉惹敢二合婆迦吽頗吒娑嚩二合賀此是賀囉惹敢二合婆夜叉王真言惹敢二合婆迦野羼捺囉二合野娑嚩二合賀此是惹敢二合婆迦夜叉王真言護努護努喃曩引酥細拏也二合野娑嚩二合賀此是酥細拏夜叉王真言賀囉賀囉贊捺囉二合細引曩引野娑嚩二合引賀此是贊捺囉二合細引曩夜叉王真言惹婆曩引野娑嚩二合賀此是護摩真言若作護摩用阿波摩陵誐濕柴以酥酪蜜搵此柴頭持戒一晝夜作護摩八千得大聰明能令誦人日記一千頌永不忘失若以阿里迦木根作寶藏神相可長六指已來頭戴天冠種種莊嚴以香花供養然用阿波摩陵誐濕柴於酥酪蜜中搵過作護摩一洛叉日日得銀錢一百復說寶藏神心真言曩謨引囉怛曩二合怛囉二合夜引野曩謨引摩引尼婆捺囉二合引野摩賀引藥乞叉二合細引曩引鉢哆曳引酥引嚩引酥引尾訖里二合引尼野彌里致娑嚩二合引賀此寶藏神心真言能得最上成就若入水至膝作水護摩誦此真言能獲財利又若以儞淫二合摩木可長四指令平正用持戒畫人畫寶賢相莊嚴具足以飲食等供獻已一日三時用焰多煙少之火使紫礦作護摩八千能降伏大財主復說別夜叉王心真言文句用圓亦能令得最上成就囉怛曩二合婆捺囉二合哆帝三摩野摩努瑟摩二合囉摩尼婆捺囉二合野婆誐嚩覩引夜引唧哆娑覩二合馱摩馱摩摩引唧囉摩賀引藥乞叉二合細引曩引必隣二合哆覩嚕覩嚕摩引尼婆捺囉二合覩嚕覩嚕摩引尼婆捺囉二合俱致俱致摩引尼婆捺囉二合覩致覩致摩引尼婆捺囉二合帝致帝致摩尼婆捺囉二合娑嚩二合引賀復有壇法不揀吉星曜日亦不假持戒之者但用阿里迦木或儞淫二合摩木及別樹木作寶賢相以香花供養就日中用白芥子菜油塗在寶賢像身誦前真言百千遍日得八錢得已須令使盡不得留一錢日日如是寶藏神復說真言儀軌令持誦者先自乞食持齋誦根本真言三洛叉然後於如來前設大供獻誦真言八千能得多財次明水護摩每日以手掬水而却傾下水中如是至百掬或千掬對賢聖前而伸供獻如是至六箇月能得大財次說入大曼拏羅諸部灌頂真言惹敢二合婆曩吒謨吒迦引野娑嚩二合引賀此是謨吒迦夜叉女真言囉訖哆二合即以二合賀嚩二合娑嚩二合引賀此是囉訖哆𡁠嚩夜叉女真言摩護引那囉引野娑嚩二合引賀此是摩護那羅夜叉女真言尾摩羅尾摩羅捺里舍二合儞阿引夜引呬娑嚩二合賀尾摩羅引尾摩羅尾舍引羅曩野儞引冒馱引野娑嚩二合引賀此是尾摩羅尾舍羅夜叉女真言贊捺囉二合引輸摩帝贊捺里二合引贊捺囉二合摩帝娑嚩二合引賀此是贊捺囉輸摩帝夜叉女真言阿嚩賀儞酥路左曩唵引贊捺囉二合鉢納彌二合引娑嚩二合引賀鉢納摩二合娑囉引酥訥嚕二合摩努引囉彌引娑嚩二合引賀酥部嚕二合嚩引護鉢囉二合怛也二合野娑嚩二合引賀嚩護嚩呬儞二合末隷伽吒具引致娑嚩二合引賀此是摩賀彌伽夜叉女等真言酥枳引舍摩引隷枳引舍波里尼娑嚩二合引賀此是酥枳舍夜叉女真言嚩曩摩引隷摩引隷儞娑嚩二合引賀此是摩曩摩羅夜叉女真言烏里底二合瑟吒二合布室左二合隷引娑嚩二合引賀此是布左隷夜叉女真言訥嚕二合摩摩引隷迦引迦引隷賀隷訥嚕二合彌引枳隷枳隷娑嚩二合引賀迦摩摩引隷儞尾羅引悉儞娑嚩二合引賀迦摩摩隷薩里嚩二合引禰引嚩薩里嚩二合誐囉二合摩努引惹尾引婆誐嚩帝娑嚩二合賀摩努引惹嚩引迦引摩嚕閉引婆引尾儞娑嚩二合賀此是迦摩嚕閉等夜叉女真言酥嚕二合哆嚩引吉也二合緊迦里娑嚩二合賀此是酥嚕哆嚩引吉也二合夜叉女真言酥捺里舍二合儞引迦引彌儞娑嚩二合賀此是酥那里舍曩夜叉女真言摩護引誐里二合引婆焰迦里娑嚩二合賀此是摩護仡囉夜叉女真言印捺囉二合引野禰引嚩引地鉢哆野娑嚩二合賀此是帝釋心真言阿誐曩二合引曳引賀尾也二合地鉢多曳引娑嚩二合賀此是火天真言夜摩引野必里二合引哆引地鉢哆曳引娑嚩二合引賀此是夜摩天心真言乃引里怛也二合曳引洛乞叉二合娑引地鉢哆曳引娑嚩二合賀此是乃乙里帝心真言嚩嚕拏也二合野惹羅引地鉢哆曳引娑嚩二合引賀此是水天心真言嚩引野尾引按哆里乞叉二合引地鉢哆曳引娑嚩二合引賀此是風天心真言俱尾引囉引野馱曩鉢哆曳引娑嚩二合引賀此是俱尾羅心真言伊舍曩引野馱曩引地鉢哆曳引娑嚩二合引賀此是伊舍曩天心真言惹里馱二合沒囉二合憾摩二合尼所二合娑嚩二合引賀此是大梵天心真言阿冒引尾瑟拏二合吠引娑嚩二合引賀此是那羅延天心真言阿儞嚩里哆二合曩引野娑嚩二合引賀此是金剛心真言賀囉二合哆引娑曩引野娑嚩二合引賀此是槊心真言摩賀引寫引摩引野娑嚩二合引賀此是杖心真言佉陵誐二合尾摩羅馱引里尼娑嚩二合引賀此是劍心真言嚩嚕拏嚩摩引野娑嚩二合引賀此是羂索心真言鉢囉二合普敢二合惹曩野娑嚩二合引賀此是幢心真言摩賀引燥引摩也二合囉娑摩曳娑嚩二合引賀此是輪心真言左引隷引閉孕二合誐隷引娑嚩二合引賀此是三股叉心真言并結界同用娑囉捺引野娑嚩二合引賀此是弓箭真言唵引惹里馱二合惹羅嚩口囉二合半惹囉引野娑嚩二合賀此是金剛網真言如是各各本尊真言一一持誦加持賢瓶所有入曼拏羅弟子用此賢瓶而與灌頂令得富貴吉祥若入大曼拏羅志心依法虔誠灌頂復能得見寶藏神三時教勅通達大印復作護摩以二十種物作廣大供獻誦聖天及大夜叉王本尊真言一日三時隨力供養得三昧真言最上成就為自擁護佛言我今復說所作精熟最上印法及真言句爾時大夜叉王等心生渴仰請佛宣說爾時世尊遍觀大會作師子吼告言汝等諦聽諦聽今此寶藏神真言印法具大慈悲難調伏者而能調伏與一切眾生成就一切勝利之事夜叉王等右膝著地合掌向佛默然而聽爾時世尊如大師子自在無畏說真言印二手平掌相並二中指相交二無名指如針屈第三節二頭指附無名指大指順依頭指二小指如針此是寶藏神根本印此印結中間得寶藏神現身觀察誦人得施願成就誦此真言曩謨引囉怛曩二合怛囉二合夜野引曩謨摩引尼婆捺囉二合引野摩賀引藥乞叉二合細引曩引鉢哆曳引唵引惹敢二合婆羅惹隣捺囉二合引野娑嚩二合引賀此真言及印於自身上五處用之作此法時彼持誦人如自為寶藏神次作左隣捺囉夜叉王印以二手合拳小指如針誦此真言唵引左隣引捺囉二合引野娑嚩二合引賀此真言印能令夜叉王而作擁護次作目契夜叉王印以手合拳小指入掌無名指如針誦此真言唵引目契孕二合捺囉二合野娑嚩二合引賀此真言印亦能擁護誦人次作一切夜叉女印以小指入掌無名指屈第三節誦此真言唵引惡儞此真言印亦能擁護召請亦得用次作曼拏羅牆印以二手合拳頭指各各如針誦此真言唵引左隣捺囉二合滿馱禰苦𠷑吒次作曼拏羅上面網印前印相却令頭指相合如針誦此真言唵引目契孕二合捺囉二合引野𠷑吒次作曼拏羅橛印以二手作拳垂手向地誦此真言唵引賀里二合入次召請七眷屬印如前根本印屈大指誦此真言曀呬曀呬祖嚕祖嚕惹羅娑野曩必里二合夜引野娑嚩二合引賀如是儀則能令七眷屬皆來集會次作獻閼伽水印以二手作掬大指及頭指附著中指誦此真言唵引藥羼曩那引曳捺囉二合馱曩必里二合野鉢舍也二合鉢舍也二合引娑嚩二合引賀次作獻座印合掌舉手三雙指屈第三節中指磔開大指各各相離此是寶藏神師子座印此印結中間夜叉王并眷屬同坐師子座於一切願誦此真言唵引惹敢二合婆羅惹隣捺囉二合伊那摩引娑曩摩里伽二合娑嚩二合引賀次結洗浴印請召寶藏神并眷屬洗浴以二手作掬小指相交二無名指安入掌中二中指如針頭指附中指第三節大指亦附頭指誦此真言唵引娑曩二合引曩必里二合野伽吒伽吒供婆惹羅娑嚩二合引賀次結獻衣印以二手相並如掌衣物誦此真言乃引里哆引野囉引叉娑引地鉢哆曳引娑嚩二合引賀次輪誦諸部真言發遣賢聖嚩嚕拏引野俱嚩囉引地鉢哆曳引娑嚩二合引賀嚩引野尾孕二合引哆里乞叉二合引地鉢哆野娑嚩二合引賀俱尾引囉引野馱曩引地鉢哆曳娑嚩二合引賀伊舍引曩引野部哆引地鉢哆曳引娑嚩二合引賀烏里馱二合沒囉二合憾摩二合尼娑嚩二合引賀冒吠引瑟拏二合尾引娑嚩二合引賀阿尾挽帝迦引野娑嚩二合引賀嚩日囉二合護哆引娑曩引野娑嚩二合引賀設訖帝二合摩寫引摩引野娑嚩二合引賀難拏引佉陵誐二合尾摩羅左里尼娑嚩二合引賀嚩嚕拏哆摩里嚩二合賀引曳引娑嚩二合引賀播引世引鉢囉二合普敢二合惹曩野娑嚩二合賀特嚩二合惹摩賀引燥摩也二合囉娑摩二合曳引娑嚩二合賀作羯囉二合麼引羅閉孕二合誐隷引娑嚩二合引賀怛里二合輸羅摩引羅閉孕二合誐隷娑嚩二合引賀禰舍滿馱娑囉那引野娑嚩二合引賀烏里馱二合惹羅嚩日囉二合半惹囉娑嚩二合引賀
